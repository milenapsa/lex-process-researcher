services:
  lex-process-researcher:
    build: .
    ports:
      - "${LEX_PROCESS_RESEARCHER_PORT:-18080}:8080"
    env_file:
      - .env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
